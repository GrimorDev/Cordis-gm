  </head>
  <body>
    <!-- ── Tauri auto-update: clean stale SW + cache, then navigate fresh ── -->
    <script>
      (function () {
        // Detect Tauri context — __TAURI__ / __TAURI_INTERNALS__ are injected by the runtime
        var inTauri = !!(window.__TAURI__ || window.__TAURI_INTERNALS__);

        // Helper: unregister all SWs, then navigate fresh.
        // Key insight: location.reload() does NOT bypass Service Workers in
        // Chromium/WebKit — only a full navigation after unregister() does.
        // Cache clearing is fire-and-forget (we only wait for SW to be removed
        // before navigating, which is very fast ~10-50 ms).
        function cleanAndGo() {
          // Fire-and-forget cache clearing (non-blocking)
          if ('caches' in window) {
            caches.keys().then(function (names) {
              names.forEach(function (n) { caches.delete(n); });
            });
          }
          // Wait only for SW unregistration, then navigate
          var swDone = 'serviceWorker' in navigator
            ? navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(regs.map(function (r) { return r.unregister(); }));
              })
            : Promise.resolve();
          swDone.then(function () {
            // Full navigation (not reload) — after unregister(), SW won't intercept it
            window.location.replace(window.location.pathname);
          }).catch(function () {
            window.location.replace(window.location.pathname);
          });
        }

        // ── 1. After Tauri update: cordis_just_updated flag is set before relaunch ──
        if (localStorage.getItem('cordis_just_updated')) {
          localStorage.removeItem('cordis_just_updated');
          cleanAndGo();
          // Note: main.tsx may briefly load below but will be interrupted by the
          // window.location.replace() navigation that fires as soon as SW is gone
        }

        // ── 2. In Tauri: always unregister any leftover SW from previous builds ──
        //    Tauri files are embedded in the binary — SW caching only causes harm.
        if (inTauri && 'serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister(); });
          });
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register SW only on the WEB (not in Tauri desktop app)
      var inTauri = !!(window.__TAURI__ || window.__TAURI_INTERNALS__);
      if (!inTauri && 'serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () {});
        });
      }
    </script>
  </body>
</html>
