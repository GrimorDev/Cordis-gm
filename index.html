<!doctype html>

  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/png" href="/cordyn_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cordyn — Platforma dla twórców</title>
    <meta name="description" content="Cordyn to nowoczesna platforma komunikacji dla twórców, graczy i społeczności." />
    <meta name="theme-color" content="#6366f1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cordis" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/cordyn_logo.png" />
    <!-- Card profile fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Raleway:wght@400;600;700&family=Josefin+Sans:wght@400;600;700&family=Exo+2:wght@400;600;700&family=Ubuntu:wght@400;500;700&family=Press+Start+2P&family=Orbitron:wght@400;600;700&family=Bebas+Neue&family=Cinzel:wght@400;600;700&family=Playfair+Display:wght@400;600;700&family=Caveat:wght@400;600&family=Dancing+Script:wght@400;600;700&family=Pacifico&family=Righteous&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Hard-reload after auto-update: clears stale webview/SW cache BEFORE React loads -->
    <script>
      (function () {
        if (localStorage.getItem('cordis_just_updated')) {
          localStorage.removeItem('cordis_just_updated');
          // Unregister service workers so they don't serve stale files
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) { r.unregister(); });
            });
          }
          // Clear all caches, then force a hard reload — no cache-bust URL
          // (URL query params break Tauri local file serving)
          if ('caches' in window) {
            caches.keys().then(function (names) {
              return Promise.all(names.map(function (n) { return caches.delete(n); }));
            }).then(function () {
              location.reload(true);
            }).catch(function () {
              location.reload(true);
            });
          } else {
            location.reload(true);
          }
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
