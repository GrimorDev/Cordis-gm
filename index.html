<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/cordyn_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cordyn — Platforma dla twórców</title>
    <meta name="description" content="Cordyn to nowoczesna platforma komunikacji dla twórców, graczy i społeczności." />
    <meta name="theme-color" content="#6366f1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cordis" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/cordyn_logo.png" />
    <!-- Card profile fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Press+Start+2P&family=Caveat:wght@400;600&family=Playfair+Display:wght@400;600;700&family=Bebas+Neue&family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Hard-reload after auto-update: clears stale webview/SW cache BEFORE React loads -->
    <script>
      (function () {
        if (localStorage.getItem('cordis_just_updated')) {
          localStorage.removeItem('cordis_just_updated');
          if ('caches' in window) {
            caches.keys().then(function (names) {
              names.forEach(function (n) { caches.delete(n); });
            });
          }
          // Navigate to cache-busted URL so webview fetches fresh assets
          var clean = location.href.split('?')[0];
          location.replace(clean + '?_r=' + Date.now());
        } else if (location.search.indexOf('_r=') !== -1) {
          // Already on fresh URL — strip the cache-buster param silently
          history.replaceState(null, '', location.pathname);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
