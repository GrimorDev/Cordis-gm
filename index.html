  <body>
    <!-- ── DevTools / inspect protection ─────────────────────────────── -->
    <script>
      (function () {
        'use strict';

        // ── 1. Block keyboard shortcuts ─────────────────────────────────
        document.addEventListener('keydown', function (e) {
          var k = e.key || '';
          var c = e.code || '';
          // F12
          if (k === 'F12' || c === 'F12') { e.preventDefault(); e.stopImmediatePropagation(); return false; }
          // Ctrl/Cmd combos
          if (e.ctrlKey || e.metaKey) {
            // Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+Shift+C / Ctrl+Shift+K
            if (e.shiftKey && (k==='i'||k==='I'||k==='j'||k==='J'||k==='c'||k==='C'||k==='k'||k==='K')) {
              e.preventDefault(); e.stopImmediatePropagation(); return false;
            }
            // Ctrl+U (view source)
            if (k==='u'||k==='U') { e.preventDefault(); e.stopImmediatePropagation(); return false; }
            // Ctrl+S (save page)
            if (k==='s'||k==='S') { e.preventDefault(); e.stopImmediatePropagation(); return false; }
            // Ctrl+P (print — reveals DOM)
            if (k==='p'||k==='P') { e.preventDefault(); e.stopImmediatePropagation(); return false; }
          }
        }, true);

        // ── 3. Console warning (Discord-style) ─────────────────────────
        var _noop = function(){};
        try {
          console.log(
            '%cSTOP!',
            'color:#ef4444;font-size:56px;font-weight:900;-webkit-text-stroke:2px #7f1d1d;'
          );
          console.log(
            '%cTo jest funkcja przeglądarki przeznaczona dla deweloperów.\n' +
            'Jeśli ktoś kazał Ci tu coś wkleić aby uzyskać dostęp do Cordyn lub "zhackować" konto — to OSZUSTWO.\n' +
            'Wklejenie czegokolwiek tutaj może dać atakującemu pełny dostęp do Twojego konta.',
            'color:#fbbf24;font-size:14px;font-weight:600;line-height:1.6;'
          );
        } catch(e) {}

        // ── 4. DevTools size detection — redirect/blank on open ────────
        var _devtoolsOpen = false;
        var _threshold = 160;
        function _checkDevTools() {
          var widthDiff  = window.outerWidth  - window.innerWidth;
          var heightDiff = window.outerHeight - window.innerHeight;
          if (widthDiff > _threshold || heightDiff > _threshold) {
            if (!_devtoolsOpen) {
              _devtoolsOpen = true;
              // Clear console on every open
              try { console.clear(); } catch(e){}
              try {
                console.log(
                  '%cSTOP!',
                  'color:#ef4444;font-size:56px;font-weight:900;'
                );
                console.log(
                  '%cNieautoryzowany dostęp do narzędzi deweloperskich jest monitorowany.',
                  'color:#fbbf24;font-size:14px;font-weight:600;'
                );
              } catch(e){}
            }
          } else {
            _devtoolsOpen = false;
          }
        }
        setInterval(_checkDevTools, 1000);

        // ── 5. Debugger trap — pauses anyone who opens Sources tab ─────
        // Runs every 3 s; effectively stalls debugger stepping.
        (function _trap() {
          try { (function(){ try { (function(d){if(('' + d/d).length !== 1 || d % 20 === 0) { (function(){}).constructor('debugger')(); }})(Date.now()); } catch(e){} }()); } catch(e){}
          setTimeout(_trap, 3000);
        })();

      })();
    </script>
    <!-- ── Tauri auto-update: clean stale SW + cache, then navigate fresh ── -->
    <script>
      (function () {
        // Detect Tauri context — __TAURI__ / __TAURI_INTERNALS__ are injected by the runtime
        var inTauri = !!(window.__TAURI__ || window.__TAURI_INTERNALS__);

        // Helper: unregister all SWs, then navigate fresh.
        // Key insight: location.reload() does NOT bypass Service Workers in
        // Chromium/WebKit — only a full navigation after unregister() does.
        // Cache clearing is fire-and-forget (we only wait for SW to be removed
        // before navigating, which is very fast ~10-50 ms).
        function cleanAndGo() {
          // Fire-and-forget cache clearing (non-blocking)
          if ('caches' in window) {
            caches.keys().then(function (names) {
              names.forEach(function (n) { caches.delete(n); });
            });
          }
          // Wait only for SW unregistration, then navigate
          var swDone = 'serviceWorker' in navigator
            ? navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(regs.map(function (r) { return r.unregister(); }));
              })
            : Promise.resolve();
          swDone.then(function () {
            // Full navigation (not reload) — after unregister(), SW won't intercept it
            window.location.replace(window.location.pathname);
          }).catch(function () {
            window.location.replace(window.location.pathname);
          });
        }

        // ── 1. After Tauri update: cordis_just_updated flag is set before relaunch ──
        if (localStorage.getItem('cordis_just_updated')) {
          localStorage.removeItem('cordis_just_updated');
          cleanAndGo();
          // Note: main.tsx may briefly load below but will be interrupted by the
          // window.location.replace() navigation that fires as soon as SW is gone
        }

        // ── 2. In Tauri: always unregister any leftover SW from previous builds ──
        //    Tauri files are embedded in the binary — SW caching only causes harm.
        if (inTauri && 'serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister(); });
          });
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register SW only on the WEB (not in Tauri desktop app)
      var inTauri = !!(window.__TAURI__ || window.__TAURI_INTERNALS__);
      if (!inTauri && 'serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () {});
        });
      }
    </script>
  </body>
</html>
