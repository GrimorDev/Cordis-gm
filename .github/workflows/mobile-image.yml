name: Build Mobile PWA Docker Image

# Builds the Expo web export and pushes the image to GitHub Container Registry.
# Portainer then pulls ghcr.io/grimordev/cordis-mobile:latest — no local build on VPS.
on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-image.yml'
  # Allow manual trigger from the Actions UI
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

concurrency:
  group: mobile-image
  cancel-in-progress: true

jobs:
  build-push:
    name: Build & push mobile image
    runs-on: ubuntu-latest   # 7 GB RAM — enough for Metro bundler

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./mobile
          file: ./mobile/Dockerfile
          push: true
          # Cache layers between runs (speeds up rebuilds ~3-5x)
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          tags: |
            ghcr.io/grimordev/cordis-web:mobile
            ghcr.io/grimordev/cordis-web:mobile-${{ github.sha }}
