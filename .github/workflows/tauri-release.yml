name: Build Cordyn Desktop (.exe)

# Trigger: push a git tag like "v0.1.0"  →  builds .exe + creates GitHub Release
# Manual trigger also available from Actions tab
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.2.0)'
        required: false
        default: 'dev'

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      # 1 — Checkout code
      - uses: actions/checkout@v4

      # 2 — Install Rust (stable, with Windows MSVC target)
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # 3 — Cache Rust cargo registry + build artefacts
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # 4 — Install Node + pnpm
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      # 5 — Install JS deps
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 6 — Build Tauri app
      #     VITE_API_BASE points to your VPS backend.
      #     Set VITE_API_BASE in repo Settings → Secrets & variables → Actions.
      - name: Build Tauri (.exe)
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri:build

      # 7 — Upload installer as artifact (always, even on manual run)
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cordyn-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      # 8 — Create GitHub Release (only on tag push)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Cordyn ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: src-tauri/target/release/bundle/nsis/*.exe
          body: |
            ## Cordyn Desktop ${{ github.ref_name }}

            ### Instalacja
            1. Pobierz plik `Cordyn_*_x64-setup.exe`
            2. Uruchom instalator
            3. Aplikacja zainstaluje się i uruchomi automatycznie

            ### Wymagania
            - Windows 10 / 11 (64-bit)
            - Połączenie z internetem (łączy się z serwerem Cordyn)
