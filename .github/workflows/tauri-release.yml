name: Build Cordyn Desktop (.exe)

# Trigger: push a git tag like "v0.1.0"  →  builds .exe + creates GitHub Release
# Manual trigger also available from Actions tab
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.2.0)'
        required: false
        default: 'dev'

permissions:
  contents: write   # required to create GitHub Releases and upload assets

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      # 1 — Checkout code
      - uses: actions/checkout@v4

      # 2 — Install Rust (stable, with Windows MSVC target)
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # 3 — Cache Rust cargo registry + build artefacts
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # 4 — Install Node + pnpm
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      # 5 — Install JS deps
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5b — Sync version in tauri.conf.json with git tag (e.g. v0.1.11 → "0.1.11")
      - name: Sync app version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          $conf = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $conf.version = $tag
          $conf | ConvertTo-Json -Depth 10 | Out-File "src-tauri/tauri.conf.json" -Encoding utf8NoBOM
          Write-Host "Set app version to $tag"

      # 6 — Build Tauri app (with updater signing)
      - name: Build Tauri (.exe + updater bundle)
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri:build

      # 7 — Upload installer as artifact (always, even on manual run)
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cordyn-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      # 8 — List bundle directory (so we always know what Tauri generated)
      - name: List bundle output
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          Write-Host "=== NSIS bundle directory ==="
          Get-ChildItem "src-tauri/target/release/bundle/nsis/" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.Name }

      # 9 — Create GitHub Release with installer + updater artifacts (only on tag push)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Cordyn ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          body: |
            ## Cordyn Desktop ${{ github.ref_name }}

            ### Instalacja (pierwsze uruchomienie)
            1. Pobierz plik `Cordyn_*_x64-setup.exe`
            2. Uruchom instalator
            3. Aplikacja zainstaluje się i uruchomi automatycznie

            ### Automatyczna aktualizacja
            Jeśli masz już zainstalowaną wersję, aplikacja wykryje aktualizację automatycznie i zaproponuje jej instalację.

            ### Wymagania
            - Windows 10 / 11 (64-bit)
            - Połączenie z internetem

      # 10 — Generate latest.json for the auto-updater endpoint
      - name: Generate latest.json
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          # Tauri v2 signs the .exe directly → look for .exe.sig first, then .nsis.zip.sig
          $sigFile = Get-ChildItem "$nsisDir/*.exe.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $sigFile) {
            $sigFile = Get-ChildItem "$nsisDir/*.nsis.zip.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $sigFile) {
            Write-Host "ERROR: No .sig file found — TAURI_SIGNING_PRIVATE_KEY may be wrong or missing."
            exit 1
          }
          Write-Host "Found sig file: $($sigFile.Name)"
          $sig = Get-Content $sigFile.FullName -Raw
          # The download target is the file that was signed (strip .sig)
          $targetName = ($sigFile.Name -replace '\.sig$', '')
          $repoUrl = "https://github.com/GrimorDev/Cordis-gm"
          $downloadUrl = "$repoUrl/releases/download/${{ github.ref_name }}/$targetName"
          $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $json = @{
            version = $version
            notes = "Zaktualizowano Cordyn do wersji $version."
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig.Trim()
                url = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 5
          $json | Out-File -FilePath "latest.json" -Encoding utf8NoBOM
          Write-Host "Generated latest.json:"
          Get-Content "latest.json"

      # 11 — Upload latest.json to release (used by in-app auto-updater)
      - name: Upload latest.json to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
