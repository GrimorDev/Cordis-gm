name: Release — Windows (.exe) + macOS (.dmg) + Linux (.AppImage/.deb)

# Triggers:
#   - Manual dispatch (workflow_dispatch) — always builds a release
#   - Push to main that changes BINARY-relevant paths only
#
# The desktop app now BUNDLES the frontend (frontendDist = "../dist"), so the
# binary contains the JS — fixes ship with the build, no cordyn.pl redeploy.
# Therefore frontend sources (src/**, index.html, vite config, public/**) DO
# require a new binary build, alongside src-tauri/** (Rust/Tauri config).
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'src-tauri/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.npmrc'
      - '.github/workflows/tauri-release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.3.0) — leave empty to auto-bump patch'
        required: false
        default: ''

# Separate concurrency buckets:
#   - Release commits + manual dispatch  → group "release"  (de-dup real releases)
#   - Regular pushes that hit the paths filter → group "ci-{sha}" (unique, no cancellation)
# This prevents a random fix: push from cancelling an in-progress release build.
concurrency:
  group: ${{ (github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'release:')) && 'release' || format('ci-{0}', github.sha) }}
  cancel-in-progress: true

permissions:
  contents: write

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 1 — Auto-bump patch version, commit & push tag
# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  prepare:
    name: Bump version & create tag
    runs-on: ubuntu-latest
    outputs:
      tag:     ${{ steps.ver.outputs.tag }}
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute new version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            NEW="${{ inputs.version }}"
          else
            CURRENT=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          echo "version=$NEW"   >> $GITHUB_OUTPUT
          echo "tag=v$NEW"      >> $GITHUB_OUTPUT
          echo "New version: $NEW"

      - name: Patch tauri.conf.json + Cargo.toml
        run: |
          NEW="${{ steps.ver.outputs.version }}"

          python3 -c "
          import json
          with open('src-tauri/tauri.conf.json') as f:
              c = json.load(f)
          c['version'] = '${{ steps.ver.outputs.version }}'
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(c, f, indent=2)
              f.write('\n')
          "

          sed -i "0,/^version = \"[^\"]*\"/{s/^version = \"[^\"]*\"/version = \"$NEW\"/}" src-tauri/Cargo.toml

          echo "=== Versions after patch ==="
          grep '"version"' src-tauri/tauri.conf.json | head -1
          grep '^version' src-tauri/Cargo.toml | head -1

      - name: Commit, tag & push
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version to ${{ steps.ver.outputs.version }}"
          git tag ${{ steps.ver.outputs.tag }}
          git push origin HEAD:main
          git push origin ${{ steps.ver.outputs.tag }}

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 2 — Build on Windows, macOS, Linux in parallel
# ═══════════════════════════════════════════════════════════════════════════════
  build:
    name: Build — ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows x64 → NSIS installer (.exe) ──────────────────────────
          - name:           Windows x64
            os:             windows-latest
            rust_targets:   x86_64-pc-windows-msvc
            tauri_args:     ''
            artifact_name:  windows
            bundle_path:    src-tauri/target/release/bundle/nsis

          # ── macOS Universal (Intel + Apple Silicon) → DMG + app.tar.gz ─────
          # Uses macos-latest (macOS 14 ARM64) — best runner availability.
          # Tauri builds the .app bundle; DMG is created manually via hdiutil
          # so we don't depend on create-dmg / osascript (which fail headless).
          - name:           macOS Universal
            os:             macos-latest
            rust_targets:   x86_64-apple-darwin aarch64-apple-darwin
            tauri_args:     --target universal-apple-darwin
            artifact_name:  macos
            bundle_path:    src-tauri/target/universal-apple-darwin/release/bundle

          # ── Linux x64 → AppImage + .deb ───────────────────────────────────
          # ubuntu-22.04 ships webkit2gtk-4.1 which Tauri 2 requires
          - name:           Linux x64
            os:             ubuntu-22.04
            rust_targets:   x86_64-unknown-linux-gnu
            tauri_args:     ''
            artifact_name:  linux
            bundle_path:    src-tauri/target/release/bundle

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      # ── Linux system dependencies ─────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libasound2-dev \
            libpipewire-0.3-dev

      # ── Linux: pre-fetch AppRun so Tauri doesn't hit the broken 404 URL ───
      # tauri-bundler tries to download AppRun from the tag "apprun-old" which
      # was removed from tauri-apps/binary-releases → HTTP 404 → build fails.
      # We download the same binary from AppImageKit's authoritative releases
      # and place it in the Tauri tool-cache path so the bundler finds it there
      # and skips the network fetch entirely.
      - name: Pre-fetch AppRun for AppImage bundler
        if: matrix.os == 'ubuntu-22.04'
        run: |
          APPRUN_URL="https://github.com/AppImage/AppImageKit/releases/download/continuous/AppRun-x86_64"
          # Tauri CLI caches downloaded tools in $HOME/.cache/tauri/
          # (dirs::cache_dir() on Linux → ~/.cache, subdirectory "tauri")
          for DIR in \
              "$HOME/.cache/tauri" \
              "$HOME/.local/share/tauri" \
              "$HOME/.cache/tauri-bundler"; do
            mkdir -p "$DIR"
            curl -fsSL -o "$DIR/AppRun-x86_64" "$APPRUN_URL"
            chmod +x "$DIR/AppRun-x86_64"
          done
          echo "AppRun staged at $(ls -lh $HOME/.cache/tauri/AppRun-x86_64)"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache Cargo build artifacts
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-tauri-target-${{ matrix.rust_targets }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-tauri-target-${{ matrix.rust_targets }}-

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            backend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install JS dependencies
        run: pnpm install --no-frozen-lockfile

      # macOS: no extra tools needed — DMG is built via hdiutil (built-in)

      - name: Verify VITE_API_BASE
        shell: bash
        run: |
          if [ -z "${{ secrets.VITE_API_BASE }}" ]; then
            echo "::error::VITE_API_BASE secret is not set!"
            exit 1
          fi
          echo "VITE_API_BASE OK: ${{ secrets.VITE_API_BASE }}"

      - name: Build Tauri app
        env:
          VITE_API_BASE:                      ${{ secrets.VITE_API_BASE }}
          # TURN relay for the WebRTC mesh (see docker-compose.yml `coturn` service).
          # Desktop apps BUNDLE the frontend (frontendDist = ../dist), so this must be
          # baked in here too — setting it only in the Portainer/.env web build does
          # NOT reach desktop binaries, they'd silently keep using STUN-only ICE servers.
          # Optional: leave the secrets unset to keep current STUN-only behaviour.
          VITE_TURN_URL:                      ${{ secrets.VITE_TURN_URL }}
          VITE_TURN_USERNAME:                 ${{ secrets.VITE_TURN_USERNAME }}
          VITE_TURN_CREDENTIAL:               ${{ secrets.VITE_TURN_CREDENTIAL }}
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.os == 'macos-latest' && '-' || '' }}
        run: pnpm exec tauri build ${{ matrix.tauri_args }}

      - name: List bundle output
        shell: bash
        run: ls -lhR "${{ matrix.bundle_path }}/" 2>/dev/null || echo "(bundle directory not found)"

      # Linux: collect AppImage + deb from different subdirs
      # Also create versionless aliases (Cordyn_amd64.deb / Cordyn_amd64.AppImage)
      # so https://github.com/.../releases/latest/download/Cordyn_amd64.deb always works
      - name: Collect Linux artifacts
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir -p linux-dist
          find src-tauri/target/release/bundle/appimage -name "*.AppImage"     2>/dev/null | xargs -I{} cp {} linux-dist/ || true
          find src-tauri/target/release/bundle/appimage -name "*.AppImage.sig" 2>/dev/null | xargs -I{} cp {} linux-dist/ || true
          find src-tauri/target/release/bundle/deb      -name "*.deb"          2>/dev/null | xargs -I{} cp {} linux-dist/ || true
          find src-tauri/target/release/bundle/deb      -name "*.deb.sig"      2>/dev/null | xargs -I{} cp {} linux-dist/ || true
          # Versionless aliases — stable URLs for download buttons and docs
          DEB=$(find linux-dist -name "*.deb" ! -name "*.deb.sig" | head -1)
          APPIMG=$(find linux-dist -name "*.AppImage" ! -name "*.AppImage.sig" | head -1)
          [ -n "$DEB" ]    && cp "$DEB"    linux-dist/Cordyn_amd64.deb
          [ -n "$APPIMG" ] && cp "$APPIMG" linux-dist/Cordyn_amd64.AppImage
          ls -lh linux-dist/

      # macOS: collect DMG (installer) + app.tar.gz (updater bundle)
      # macOS: Tauri builds .app bundle; we create DMG manually via hdiutil
      # (no create-dmg / osascript dependency — works on any macOS runner)
      - name: Build macOS DMG manually
        if: matrix.os == 'macos-latest'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle/macos"
          APP=$(find "$BUNDLE_DIR" -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP" ]; then echo "ERROR: .app not found in $BUNDLE_DIR"; ls "$BUNDLE_DIR" || true; exit 1; fi
          echo "Found .app: $APP"

          DMG_NAME="Cordyn_${VERSION}_universal.dmg"

          # Stage: .app + /Applications symlink in a temp folder
          mkdir -p dmg_staging
          cp -R "$APP" dmg_staging/
          ln -s /Applications dmg_staging/Applications

          # Build compressed DMG directly from the staging folder (no mount needed)
          hdiutil create \
            -srcfolder dmg_staging \
            -volname "Cordyn" \
            -fs HFS+ \
            -format UDZO \
            -imagekey zlib-level=9 \
            -ov \
            "$DMG_NAME"

          rm -rf dmg_staging

          # Ad-hoc sign the DMG
          codesign --force --sign "-" "$DMG_NAME" || true

          echo "DMG created: $(ls -lh $DMG_NAME)"

      - name: Collect macOS artifacts
        if: matrix.os == 'macos-latest'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          mkdir -p macos-dist
          # DMG we built manually
          find . -maxdepth 1 -name "*.dmg" | xargs -I{} cp {} macos-dist/ || true
          # .app.tar.gz + .sig for the auto-updater (built by Tauri with createUpdaterArtifacts)
          find src-tauri/target/universal-apple-darwin/release/bundle/macos -name "*.app.tar.gz"     2>/dev/null | xargs -I{} cp {} macos-dist/ || true
          find src-tauri/target/universal-apple-darwin/release/bundle/macos -name "*.app.tar.gz.sig" 2>/dev/null | xargs -I{} cp {} macos-dist/ || true
          ls -lh macos-dist/

      # Windows: collect only current-version NSIS files to avoid old cache artifacts
      - name: Collect Windows artifacts
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p windows-dist
          VERSION="${{ needs.prepare.outputs.version }}"
          find src-tauri/target/release/bundle/nsis -name "Cordyn_${VERSION}_*" 2>/dev/null | xargs -I{} cp {} windows-dist/ || true
          ls -lh windows-dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          retention-days: 7
          path: |
            ${{ matrix.os == 'ubuntu-22.04' && 'linux-dist/*' || '' }}
            ${{ matrix.os == 'macos-latest'  && 'macos-dist/*'   || '' }}
            ${{ matrix.os == 'windows-latest' && 'windows-dist/*' || '' }}

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 3 — Publish GitHub Release + latest.json for auto-updater
# ═══════════════════════════════════════════════════════════════════════════════
  release:
    name: Publish GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: dist/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos
          path: dist/macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux
          path: dist/linux

      - name: List all artifacts
        run: find dist/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ needs.prepare.outputs.tag }}
          name:                   Cordyn ${{ needs.prepare.outputs.tag }}
          draft:                  false
          prerelease:             false
          fail_on_unmatched_files: false
          files: |
            dist/windows/*.exe
            dist/windows/*.exe.sig
            dist/windows/*.nsis.zip
            dist/windows/*.nsis.zip.sig
            dist/macos/*.dmg
            dist/macos/*.dmg.sig
            dist/macos/*.app.tar.gz
            dist/macos/*.app.tar.gz.sig
            dist/linux/*.AppImage
            dist/linux/*.AppImage.sig
            dist/linux/*.deb
            dist/linux/*.deb.sig
          body: |
            ## Cordyn Desktop ${{ needs.prepare.outputs.tag }}

            ### 🪟 Windows
            Pobierz **`Cordyn_*_x64-setup.exe`** i uruchom instalator.

            ### 🍎 macOS (Intel + Apple Silicon)
            Pobierz **`Cordyn_*.dmg`**, otwórz i przeciągnij do folderu Applications.
            > ⚠️ Przy **pierwszym uruchomieniu**: kliknij prawym → **Otwórz** → Otwórz mimo to.

            ### 🐧 Linux (x64)
            - **AppImage** — `Cordyn_*.AppImage` → `chmod +x` i uruchom bezpośrednio (bez instalacji)
            - **Debian/Ubuntu** — `Cordyn_*.deb` → `sudo dpkg -i Cordyn_*.deb`
            > Wymagania: GTK 3, WebKit2GTK 4.1 (`libwebkit2gtk-4.1-0`)

            ### 🔄 Automatyczna aktualizacja
            Zainstalowane wersje aktualizują się automatycznie.

            ### Wymagania systemowe
            - **Windows** 10 / 11 (64-bit)
            - **macOS** 11.0 Big Sur lub nowszy (Intel & Apple Silicon)
            - **Linux** Ubuntu 22.04+ / Fedora 38+ lub kompatybilna dystrybucja

      - name: Generate latest.json
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          REPO="https://github.com/GrimorDev/Cordis-gm"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "=== dist/windows ==="
          find dist/windows -type f | sort || true
          echo "=== dist/macos ==="
          find dist/macos   -type f | sort || true
          echo "=== dist/linux ==="
          find dist/linux   -type f | sort || true

          # Windows — prefer .nsis.zip.sig (updater bundle), fall back to .exe.sig
          # Always match current VERSION to avoid picking up stale cache artifacts
          WIN_SIG_FILE=$(find dist/windows -name "Cordyn_${VERSION}_*.nsis.zip.sig" | sort | head -1)
          [ -z "$WIN_SIG_FILE" ] && WIN_SIG_FILE=$(find dist/windows -name "Cordyn_${VERSION}_*.exe.sig" | sort | head -1)
          WIN_SIG=""; WIN_URL=""
          if [ -n "$WIN_SIG_FILE" ]; then
            WIN_SIG=$(cat "$WIN_SIG_FILE" | tr -d '\n')
            WIN_FILE=$(basename "$WIN_SIG_FILE" .sig)
            WIN_URL="$REPO/releases/download/$TAG/$WIN_FILE"
            echo "Windows updater: $WIN_FILE"
          else
            echo "WARNING: no Windows sig file found for version $VERSION"
          fi

          # macOS — Tauri 2 uses .app.tar.gz for delta updates (not .dmg)
          # .dmg.sig is for the installer only; the updater needs .app.tar.gz.sig
          MAC_SIG_FILE=$(find dist/macos -name "*.app.tar.gz.sig" | sort | head -1)
          [ -z "$MAC_SIG_FILE" ] && MAC_SIG_FILE=$(find dist/macos -name "*.dmg.sig" | sort | head -1)
          MAC_SIG=""; MAC_URL=""
          if [ -n "$MAC_SIG_FILE" ]; then
            MAC_SIG=$(cat "$MAC_SIG_FILE" | tr -d '\n')
            MAC_FILE=$(basename "$MAC_SIG_FILE" .sig)
            MAC_URL="$REPO/releases/download/$TAG/$MAC_FILE"
            echo "macOS updater: $MAC_FILE"
          else
            echo "WARNING: no macOS sig file found"
          fi

          # Linux — AppImage sig (version-specific)
          LINUX_SIG_FILE=$(find dist/linux -name "Cordyn_${VERSION}_*.AppImage.sig" | sort | head -1)
          [ -z "$LINUX_SIG_FILE" ] && LINUX_SIG_FILE=$(find dist/linux -name "*.AppImage.sig" | sort | head -1)
          LINUX_SIG=""; LINUX_URL=""
          if [ -n "$LINUX_SIG_FILE" ]; then
            LINUX_SIG=$(cat "$LINUX_SIG_FILE" | tr -d '\n')
            LINUX_FILE=$(basename "$LINUX_SIG_FILE" .sig)
            LINUX_URL="$REPO/releases/download/$TAG/$LINUX_FILE"
            echo "Linux updater: $LINUX_FILE"
          else
            echo "WARNING: no Linux sig file found for version $VERSION"
          fi

          jq -n \
            --arg version    "$VERSION" \
            --arg pub_date   "$PUB_DATE" \
            --arg win_sig    "$WIN_SIG"    --arg win_url    "$WIN_URL" \
            --arg mac_sig    "$MAC_SIG"    --arg mac_url    "$MAC_URL" \
            --arg linux_sig  "$LINUX_SIG"  --arg linux_url  "$LINUX_URL" \
            '{
              version:  $version,
              notes:    ("Zaktualizowano Cordyn do wersji " + $version + "."),
              pub_date: $pub_date,
              platforms: (
                {}
                | if $win_sig   != "" then . + {"windows-x86_64":  {url: $win_url,   signature: $win_sig}}   else . end
                | if $mac_sig   != "" then . + {"darwin-universal": {url: $mac_url,   signature: $mac_sig}}   else . end
                | if $linux_sig != "" then . + {"linux-x86_64":    {url: $linux_url, signature: $linux_sig}} else . end
              )
            }' > latest.json

          echo "=== latest.json ==="
          cat latest.json

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files:    latest.json

      - name: Delete old releases (keep last 5)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Keep the 5 most recent releases, delete the rest
          CURRENT_TAG="${{ needs.prepare.outputs.tag }}"
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName,createdAt \
            | jq -r 'sort_by(.createdAt) | reverse | .[5:] | .[].tagName' \
            | while read tag; do
                echo "Deleting old release: $tag"
                gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
              done
