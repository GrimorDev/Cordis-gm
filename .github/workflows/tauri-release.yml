name: Release — Windows (.exe) + macOS (.dmg) + Linux (.AppImage/.deb)

# Triggers on every push to main (auto-bumps patch version + creates tag).
# Skips if the commit is the bot's own version-bump commit (prevents loop).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.3.0) — leave empty to auto-bump patch'
        required: false
        default: ''

# Only one release at a time — cancel stale runs on rapid pushes.
concurrency:
  group: "${{ startsWith(github.event.head_commit.message, 'chore: bump version') && 'noop' || 'release' }}"
  cancel-in-progress: true

permissions:
  contents: write

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 1 — Auto-bump patch version, commit & push tag
# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  prepare:
    name: Bump version & create tag
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    outputs:
      tag:     ${{ steps.ver.outputs.tag }}
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute new version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            NEW="${{ inputs.version }}"
          else
            CURRENT=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          echo "version=$NEW"   >> $GITHUB_OUTPUT
          echo "tag=v$NEW"      >> $GITHUB_OUTPUT
          echo "New version: $NEW"

      - name: Patch tauri.conf.json + Cargo.toml
        run: |
          NEW="${{ steps.ver.outputs.version }}"

          python3 -c "
          import json
          with open('src-tauri/tauri.conf.json') as f:
              c = json.load(f)
          c['version'] = '${{ steps.ver.outputs.version }}'
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(c, f, indent=2)
              f.write('\n')
          "

          sed -i "0,/^version = \"[^\"]*\"/{s/^version = \"[^\"]*\"/version = \"$NEW\"/}" src-tauri/Cargo.toml

          echo "=== Versions after patch ==="
          grep '"version"' src-tauri/tauri.conf.json | head -1
          grep '^version' src-tauri/Cargo.toml | head -1

      - name: Commit, tag & push
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version to ${{ steps.ver.outputs.version }}"
          git tag ${{ steps.ver.outputs.tag }}
          git push origin HEAD:main
          git push origin ${{ steps.ver.outputs.tag }}

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 2 — Build on Windows, macOS, Linux in parallel
# ═══════════════════════════════════════════════════════════════════════════════
  build:
    name: Build — ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows x64 → NSIS installer (.exe) ──────────────────────────
          - name:           Windows x64
            os:             windows-latest
            rust_targets:   x86_64-pc-windows-msvc
            tauri_args:     ''
            artifact_name:  windows
            bundle_path:    src-tauri/target/release/bundle/nsis

          # ── macOS Universal (Intel + Apple Silicon) → DMG ─────────────────
          - name:           macOS Universal
            os:             macos-latest
            rust_targets:   x86_64-apple-darwin aarch64-apple-darwin
            tauri_args:     --target universal-apple-darwin
            artifact_name:  macos
            bundle_path:    src-tauri/target/universal-apple-darwin/release/bundle/dmg

          # ── Linux x64 → AppImage + .deb ───────────────────────────────────
          # ubuntu-22.04 ships webkit2gtk-4.1 which Tauri 2 requires
          - name:           Linux x64
            os:             ubuntu-22.04
            rust_targets:   x86_64-unknown-linux-gnu
            tauri_args:     ''
            artifact_name:  linux
            bundle_path:    src-tauri/target/release/bundle

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      # ── Linux system dependencies ─────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install JS dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify VITE_API_BASE
        shell: bash
        run: |
          if [ -z "${{ secrets.VITE_API_BASE }}" ]; then
            echo "::error::VITE_API_BASE secret is not set!"
            exit 1
          fi
          echo "VITE_API_BASE OK: ${{ secrets.VITE_API_BASE }}"

      - name: Build Tauri app
        env:
          VITE_API_BASE:                      ${{ secrets.VITE_API_BASE }}
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.os == 'macos-latest' && '-' || '' }}
        run: pnpm exec tauri build ${{ matrix.tauri_args }}

      - name: List bundle output
        shell: bash
        run: ls -lhR "${{ matrix.bundle_path }}/" 2>/dev/null || echo "(bundle directory not found)"

      # Linux: collect AppImage + deb from different subdirs
      - name: Collect Linux artifacts
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir -p linux-dist
          find src-tauri/target/release/bundle/appimage -name "*.AppImage" -o -name "*.AppImage.sig" 2>/dev/null | xargs -I{} cp {} linux-dist/ || true
          find src-tauri/target/release/bundle/deb      -name "*.deb"      -o -name "*.deb.sig"      2>/dev/null | xargs -I{} cp {} linux-dist/ || true
          ls -lh linux-dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          retention-days: 7
          path: ${{ matrix.os == 'ubuntu-22.04' && 'linux-dist/*' || format('{0}/*', matrix.bundle_path) }}

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 3 — Publish GitHub Release + latest.json for auto-updater
# ═══════════════════════════════════════════════════════════════════════════════
  release:
    name: Publish GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: dist/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos
          path: dist/macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux
          path: dist/linux

      - name: List all artifacts
        run: find dist/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ needs.prepare.outputs.tag }}
          name:                   Cordyn ${{ needs.prepare.outputs.tag }}
          draft:                  false
          prerelease:             false
          fail_on_unmatched_files: false
          files: |
            dist/windows/*.exe
            dist/windows/*.exe.sig
            dist/windows/*.nsis.zip
            dist/windows/*.nsis.zip.sig
            dist/macos/*.dmg
            dist/macos/*.dmg.sig
            dist/linux/*.AppImage
            dist/linux/*.AppImage.sig
            dist/linux/*.deb
            dist/linux/*.deb.sig
          body: |
            ## Cordyn Desktop ${{ needs.prepare.outputs.tag }}

            ### 🪟 Windows
            Pobierz **`Cordyn_*_x64-setup.exe`** i uruchom instalator.

            ### 🍎 macOS (Intel + Apple Silicon)
            Pobierz **`Cordyn_*.dmg`**, otwórz i przeciągnij do folderu Applications.
            > ⚠️ Przy **pierwszym uruchomieniu**: kliknij prawym → **Otwórz** → Otwórz mimo to.

            ### 🐧 Linux (x64)
            - **AppImage** — `Cordyn_*.AppImage` → `chmod +x` i uruchom bezpośrednio (bez instalacji)
            - **Debian/Ubuntu** — `Cordyn_*.deb` → `sudo dpkg -i Cordyn_*.deb`
            > Wymagania: GTK 3, WebKit2GTK 4.1 (`libwebkit2gtk-4.1-0`)

            ### 🔄 Automatyczna aktualizacja
            Zainstalowane wersje aktualizują się automatycznie.

            ### Wymagania systemowe
            - **Windows** 10 / 11 (64-bit)
            - **macOS** 11.0 Big Sur lub nowszy (Intel & Apple Silicon)
            - **Linux** Ubuntu 22.04+ / Fedora 38+ lub kompatybilna dystrybucja

      - name: Generate latest.json
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          REPO="https://github.com/GrimorDev/Cordis-gm"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          WIN_SIG_FILE=$(find dist/windows -name "*.nsis.zip.sig" | head -1)
          [ -z "$WIN_SIG_FILE" ] && WIN_SIG_FILE=$(find dist/windows -name "*.exe.sig" | head -1)
          WIN_SIG=""; WIN_URL=""
          if [ -n "$WIN_SIG_FILE" ]; then
            WIN_SIG=$(cat "$WIN_SIG_FILE" | tr -d '\n')
            WIN_FILE=$(basename "$WIN_SIG_FILE" .sig)
            WIN_URL="$REPO/releases/download/$TAG/$WIN_FILE"
          fi

          MAC_SIG_FILE=$(find dist/macos -name "*.dmg.sig" | head -1)
          MAC_SIG=""; MAC_URL=""
          if [ -n "$MAC_SIG_FILE" ]; then
            MAC_SIG=$(cat "$MAC_SIG_FILE" | tr -d '\n')
            MAC_FILE=$(basename "$MAC_SIG_FILE" .sig)
            MAC_URL="$REPO/releases/download/$TAG/$MAC_FILE"
          fi

          LINUX_SIG_FILE=$(find dist/linux -name "*.AppImage.sig" | head -1)
          LINUX_SIG=""; LINUX_URL=""
          if [ -n "$LINUX_SIG_FILE" ]; then
            LINUX_SIG=$(cat "$LINUX_SIG_FILE" | tr -d '\n')
            LINUX_FILE=$(basename "$LINUX_SIG_FILE" .sig)
            LINUX_URL="$REPO/releases/download/$TAG/$LINUX_FILE"
          fi

          jq -n \
            --arg version    "$VERSION" \
            --arg pub_date   "$PUB_DATE" \
            --arg win_sig    "$WIN_SIG"    --arg win_url    "$WIN_URL" \
            --arg mac_sig    "$MAC_SIG"    --arg mac_url    "$MAC_URL" \
            --arg linux_sig  "$LINUX_SIG"  --arg linux_url  "$LINUX_URL" \
            '{
              version:  $version,
              notes:    ("Zaktualizowano Cordyn do wersji " + $version + "."),
              pub_date: $pub_date,
              platforms: (
                {}
                | if $win_sig   != "" then . + {"windows-x86_64":  {url: $win_url,   signature: $win_sig}}   else . end
                | if $mac_sig   != "" then . + {"darwin-universal": {url: $mac_url,   signature: $mac_sig}}   else . end
                | if $linux_sig != "" then . + {"linux-x86_64":    {url: $linux_url, signature: $linux_sig}} else . end
              )
            }' > latest.json

          echo "=== latest.json ==="
          cat latest.json

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files:    latest.json
