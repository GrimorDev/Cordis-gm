# ═══════════════════════════════════════════════════════════════════
#  Cordis – Nginx Server Block (conf.d/cordis.conf)
#  Upstream `backend` is defined in nginx-main.conf (keepalive pool).
# ═══════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Allow uploads up to 60MB (attachments up to 50MB + multipart overhead)
    client_max_body_size 60m;

    # ── Gzip compression ─────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   5;
    gzip_proxied      any;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml
               application/font-woff application/font-woff2;

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header X-XSS-Protection       "1; mode=block"                always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── DNS resolver (required for proxy_pass to external HTTPS hosts) ─
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ── Mobile PWA — proxy to dedicated mobile container ─────────────
    # Expo web export with experiments.baseUrl="/app"
    # ^~ prevents the static-assets regex from stealing /app/_expo/*.js etc.
    # Strip /app prefix → mobile nginx receives paths starting with /
    location ^~ /app/ {
        proxy_pass         http://mobile/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_cache        off;
    }

    # ── Service Worker — never cache ─────────────────────────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri =404;
    }

    # ── Static assets — immutable cache (Vite content-hashed names) ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── DeepFilterNet3 model proxy (fixes CORS from cdn.mezon.ai) ────
    location /df-cdn/ {
        proxy_pass https://cdn.mezon.ai/AI/models/datas/noise_suppression/deepfilternet3/;
        proxy_set_header Host cdn.mezon.ai;
        proxy_set_header Accept-Encoding "";
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── SSE endpoints — disable buffering so events flush immediately ───
    location ~ ^/api/admin/perf/stream {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_buffering       off;
        proxy_cache           off;
        proxy_request_buffering off;
        # SSE keepalive
        chunked_transfer_encoding on;
    }

    # ── API — proxied to backend upstream (keepalive pool) ───────────
    location /api/ {
        # Nginx-level rate limit (coarse IP-based; app does per-user via Redis)
        limit_req zone=api_zone burst=500 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        # Clear Connection header so upstream keepalive works
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow long-running requests (stream proxy, polling)
        proxy_read_timeout    86400s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 5s;
        proxy_request_buffering off;
    }

    # Auth endpoints — tighter rate limit
    location ~ ^/api/auth/(login|register) {
        limit_req zone=auth_zone burst=20 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── Socket.IO — WebSocket + long-polling ─────────────────────────
    location /socket.io/ {
        # Per-IP concurrent WS connections limit (prevents abuse)
        limit_conn ws_conn 50;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        # WebSocket upgrade headers
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Keep WebSocket connections alive indefinitely (no idle-timeout kill)
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 5s;

        # Disable response buffering for real-time events
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── Uploaded files (user avatars, attachments) ────────────────────
    # ^~ prevents the static-assets regex from intercepting /uploads/*.jpg
    location ^~ /uploads/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # No caching — user-uploaded content changes (avatars, etc.)
        add_header Cache-Control "no-cache";
    }

    # ── SPA fallback — all routes serve index.html ────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
