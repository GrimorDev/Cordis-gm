# ═══════════════════════════════════════════════════════════════════
#  Cordis – Nginx Main Config (replaces /etc/nginx/nginx.conf)
#  Tuned for 100 000 concurrent WebSocket connections.
#  Copied by Dockerfile as /etc/nginx/nginx.conf.
# ═══════════════════════════════════════════════════════════════════

user nginx;

# One worker per CPU core — kernel distributes accept() evenly.
worker_processes auto;

# Each worker can open this many file descriptors (sockets + files).
# For 100k users: 100 000 / worker_processes × 2 + headroom.
worker_rlimit_nofile 131072;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    # Max simultaneous connections per worker.
    # worker_processes × worker_connections = theoretical max open conns.
    worker_connections 65536;

    # Linux: most efficient multi-connection polling method.
    use epoll;

    # Accept as many connections as possible in one syscall (reduces latency).
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=64k flush=5s;

    # ── Performance ──────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;   # Batch TCP packets (with sendfile)
    tcp_nodelay        on;   # Disable Nagle for WebSocket/streaming
    keepalive_timeout  75s;
    keepalive_requests 10000;

    # Reduce memory per idle connection (header buffer)
    client_header_buffer_size  1k;
    large_client_header_buffers 4 8k;

    # Upstream response buffer — avoid disk temp files
    proxy_buffering    on;
    proxy_buffer_size  16k;
    proxy_buffers      8 16k;

    # ── Rate limiting zones (Nginx-level, before app) ────────────────
    # Per-IP burst zones — complement the app-level Redis rate limiter.
    # API: 200 req/s burst per IP (handles CDN/NAT; app does per-user limiting)
    limit_req_zone $binary_remote_addr zone=api_zone:20m    rate=200r/s;
    # Auth endpoints: 10 req/min per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_zone:10m   rate=10r/m;
    # WebSocket upgrade: 50 connections/s per IP
    limit_conn_zone  $binary_remote_addr zone=ws_conn:20m;

    # ── Upstream with keepalive connection pool ───────────────────────
    # Nginx reuses backend TCP connections instead of opening a new one
    # per request. Critical for high RPS — cuts connection overhead ~70%.
    upstream backend {
        server backend:4000;
        keepalive 128;           # Pool of idle keepalive connections
        keepalive_requests 1000; # Max requests per kept-alive connection
        keepalive_timeout  60s;
    }

    # ── Include vhost configs ─────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
