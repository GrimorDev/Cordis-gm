# LiveKit SFU server config
# Keys are NOT here — injected via docker-compose command line to avoid committing secrets.
# See docker-compose.yml: livekit service → command --keys

port: 7880
bind_addresses:
  - ""

rtc:
  tcp_port: 7881
  # UDP port range for WebRTC media — must match ports exposed in docker-compose.yml
  port_range_start: 50000
  port_range_end:   50200
  # Auto-detect external IP so ICE candidates point to the correct public address.
  # Required when running behind Docker NAT on a VPS.
  use_external_ip: true
  enable_loopback_candidate: false
  # Allow TCP fallback for clients behind strict firewalls blocking UDP
  allow_tcp_fallback: true

logging:
  level: warn
  json: false

# Limits (generous defaults — tune per server capacity)
limit:
  num_tracks: 1000
  bytes_per_sec: 400000000  # 400 Mbps total server throughput cap
